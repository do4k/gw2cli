name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            artifact: gw2
          - os: ubuntu-latest
            rid: linux-arm64
            artifact: gw2
          - os: macos-latest
            rid: osx-x64
            artifact: gw2
          - os: macos-latest
            rid: osx-arm64
            artifact: gw2
          - os: windows-latest
            rid: win-x64
            artifact: gw2.exe
          - os: windows-latest
            rid: win-arm64
            artifact: gw2.exe

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore src/GW2CLI/GW2CLI.csproj

      - name: Publish
        run: |
          dotnet publish src/GW2CLI/GW2CLI.csproj \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:PublishTrimmed=false \
            -p:DebugType=None \
            -p:DebugSymbols=false \
            --output publish/${{ matrix.rid }}
        shell: bash

      - name: Rename artifact
        run: |
          mv publish/${{ matrix.rid }}/${{ matrix.artifact }} publish/${{ matrix.rid }}/gw2-${{ matrix.rid }}${{ runner.os == 'Windows' && '.exe' || '' }}
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gw2-${{ matrix.rid }}
          path: publish/${{ matrix.rid }}/gw2-${{ matrix.rid }}*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: false
