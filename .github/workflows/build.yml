name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            artifact: gw2
          - os: ubuntu-latest
            rid: linux-arm64
            artifact: gw2
          - os: macos-latest
            rid: osx-x64
            artifact: gw2
          - os: macos-latest
            rid: osx-arm64
            artifact: gw2
          - os: windows-latest
            rid: win-x64
            artifact: gw2.exe
          - os: windows-latest
            rid: win-arm64
            artifact: gw2.exe

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '11.0.x'
          dotnet-quality: 'preview'

      - name: Set version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
        shell: bash

      - name: Restore
        run: dotnet restore src/GW2CLI/GW2CLI.csproj

      - name: Publish (self-contained)
        run: |
          dotnet publish src/GW2CLI/GW2CLI.csproj \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --self-contained true \
            -p:Version=${{ env.VERSION }} \
            -p:PublishSingleFile=true \
            -p:PublishTrimmed=false \
            -p:DebugType=None \
            -p:DebugSymbols=false \
            --output publish/sc/${{ matrix.rid }}
        shell: bash

      - name: Publish (framework-dependent)
        run: |
          dotnet publish src/GW2CLI/GW2CLI.csproj \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --self-contained false \
            -p:Version=${{ env.VERSION }} \
            -p:PublishSingleFile=true \
            -p:DebugType=None \
            -p:DebugSymbols=false \
            --output publish/fd/${{ matrix.rid }}
        shell: bash

      - name: Rename artifacts
        run: |
          EXT="${{ runner.os == 'Windows' && '.exe' || '' }}"
          mv publish/sc/${{ matrix.rid }}/${{ matrix.artifact }} publish/sc/${{ matrix.rid }}/gw2-${{ matrix.rid }}${EXT}
          mv publish/fd/${{ matrix.rid }}/${{ matrix.artifact }} publish/fd/${{ matrix.rid }}/gw2-${{ matrix.rid }}-fd${EXT}
        shell: bash

      - name: Upload self-contained artifact
        uses: actions/upload-artifact@v4
        with:
          name: gw2-${{ matrix.rid }}
          path: publish/sc/${{ matrix.rid }}/gw2-${{ matrix.rid }}*

      - name: Upload framework-dependent artifact
        uses: actions/upload-artifact@v4
        with:
          name: gw2-${{ matrix.rid }}-fd
          path: publish/fd/${{ matrix.rid }}/gw2-${{ matrix.rid }}-fd*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: false
